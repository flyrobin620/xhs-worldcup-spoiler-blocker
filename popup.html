<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>世界杯防剧透</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="title"><span class="dot"></span>世界杯防剧透</div>

      <div class="row">
        <label class="label" for="toggle">启用防剧透 <span id="status" class="status on">ON</span></label>
        <label class="switch">
          <input type="checkbox" id="toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <p class="hint">
        关闭后将立即显示比分、标题与内容。<br />
        Turn off to instantly reveal scores, titles &amp; content.
      </p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
